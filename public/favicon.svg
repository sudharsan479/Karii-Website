<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Solid true black circular background -->
  <circle cx="256" cy="256" r="240" fill="#000000" stroke="#ffffff" stroke-width="16" />

  <!-- Ultra-minimal crisp white sparkle logo -->
  <g transform="translate(256, 256)">
    <!-- Main minimal 4-point sparkle in pure white -->
    <path d="M-110,0 Q0,0 0,-110 Q0,0 110,0 Q0,0 0,110 Q0,0 -110,0" fill="#ffffff" />
    
    <!-- Delicate central core spacer (transparent punch) to add negative space -->
    <circle cx="0" cy="0" r="14" fill="#000000" />
    
    <!-- Central bright white core dot -->
    <circle cx="0" cy="0" r="6" fill="#ffffff" />
  </g>
</svg>
